<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASIC ランダム演習</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f0f4fa;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }
    .app { max-width: 760px; margin: 0 auto; }

    /* ヘッダー */
    .header { margin-bottom: 1.6rem; }
    .header-inner {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #dde8f8;
      overflow: hidden;
    }
    .header-stripe { height: 5px; background: #185FA5; }
    .header-body { padding: 1.1rem 1.4rem 1rem; }
    h1 { font-size: clamp(20px, 4vw, 26px); font-weight: 800; color: #111; letter-spacing: -0.3px; }
    .tagline { font-size: 13px; color: #6b8ab5; margin-top: 3px; }

    /* パネル */
    .panel {
      background: #fff;
      border: 1px solid #dde8f8;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .panel-stripe { height: 3px; background: #185FA5; }
    .panel-body { padding: 1rem 1.3rem; }
    .panel-title {
      font-size: 10px; font-weight: 700;
      color: #6b8ab5; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 10px;
    }

    /* 科目タブ */
    .source-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .src-tab {
      font-size: 12px; font-weight: 600;
      padding: 5px 16px;
      border: 1.5px solid #B5D4F4;
      border-radius: 20px;
      background: #fff; color: #185FA5;
      cursor: pointer; transition: all 0.15s;
    }
    .src-tab.active { background: #185FA5; color: #fff; border-color: #185FA5; }

    /* 単元ボタン */
    .unit-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .unit-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .unit-btn {
      font-size: 11px; padding: 4px 12px;
      border: 1.5px solid #B5D4F4; border-radius: 20px;
      background: #fff; color: #185FA5;
      cursor: pointer; transition: all 0.12s;
    }
    .unit-btn:hover { background: #E6F1FB; }
    .unit-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .unit-btn.disabled-unit { opacity: 0.3; pointer-events: none; }
    .ctrl-btn {
      font-size: 10px; padding: 3px 10px;
      border: 1px solid #B5D4F4; border-radius: 20px;
      background: #fff; color: #6b8ab5;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .ctrl-btn:hover { background: #E6F1FB; color: #185FA5; border-color: #185FA5; }

    /* 出題数スライダー */
    .count-row { display: flex; align-items: center; gap: 14px; }
    .count-row input[type=range] { flex: 1; accent-color: #185FA5; }
    .count-val { font-size: 22px; font-weight: 800; color: #185FA5; min-width: 32px; text-align: right; }
    .count-label { font-size: 13px; color: #6b8ab5; }

    /* ガチャボタン */
    .gacha-btn {
      display: block; width: 100%;
      padding: 14px;
      font-size: 15px; font-weight: 800;
      cursor: pointer;
      background: #185FA5; color: #fff;
      border: none; border-radius: 20px;
      margin-bottom: 1.5rem;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .gacha-btn:hover { background: #0C447C; }
    .gacha-btn:active { transform: scale(0.99); }
    .gacha-btn:disabled { background: #B5D4F4; color: #fff; cursor: not-allowed; }

    /* 統計バー */
    .stats-bar { display: flex; gap: 20px; margin-bottom: 1rem; font-size: 13px; color: #6b8ab5; }
    .stats-bar strong { font-size: 15px; font-weight: 700; color: #185FA5; }

    /* 問題カード */
    .problem-list { display: flex; flex-direction: column; gap: 12px; }
    .problem-card {
      background: #fff;
      border: 1px solid #dde8f8;
      border-radius: 14px;
      overflow: hidden;
    }
    .card-stripe { height: 3px; background: #185FA5; }
    .card-body { padding: 1rem 1.3rem; }
    .card-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .num { font-size: 13px; font-weight: 700; color: #6b8ab5; min-width: 24px; }
    .src-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 9px; border-radius: 20px;
    }
    .src-badge.IA { background: #E6F1FB; color: #0C447C; border: 1px solid #B5D4F4; }
    .src-badge.IIBC { background: #E6F1FB; color: #0C447C; border: 1px solid #B5D4F4; }
    .unit-tag {
      font-size: 11px; padding: 2px 10px;
      border-radius: 20px; border: 1px solid #B5D4F4;
      color: #185FA5; background: #f4f8fd;
    }
    .prob-id { font-size: 11px; color: #B5D4F4; margin-left: auto; }

    /* 問題本文 */
    .body-tex {
      font-size: clamp(13px, 2.2vw, 15px);
      line-height: 2.0; color: #1a1a2e;
      word-break: break-word; overflow-wrap: break-word;
    }
    .katex { font-size: 1em !important; }
    .katex-display {
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      margin: 6px 0 !important; padding-bottom: 2px;
    }
    .fig-img {
      display: block; max-width: 100%;
      margin: 12px 0; border: 1px solid #dde8f8;
      border-radius: 8px;
    }

    /* subq レイアウト */
    .subq-group { display: flex; flex-wrap: wrap; gap: 0; margin: 4px 0; }
    .subq-item { padding: 3px 0; line-height: 2.1; }
    .subq-item.short { min-width: min(200px,100%); flex: 1 1 200px; }
    .subq-item.long  { width: 100%; flex: 0 0 100%; }
    .subq-item.has-frac { padding: 8px 0; line-height: 2.5; }
    .subq-item.short.has-frac { min-width: min(180px,100%); flex: 1 1 180px; }
    .body-line { margin: 0; padding: 1px 0; line-height: 2.0; }
    .body-line.has-frac { padding: 8px 0; line-height: 2.5; }
    .display-math { margin: 10px 0; }

    /* 空状態 */
    .empty {
      text-align: center; padding: 3rem 1rem;
      color: #6b8ab5; font-size: 15px;
      border: 1.5px dashed #B5D4F4;
      border-radius: 14px; background: #f7faff;
    }

    /* レスポンシブ */
    @media (min-width: 768px) {
      body { padding: 2.5rem 2rem 5rem; }
      .panel-body { padding: 1.2rem 1.5rem; }
      .card-body { padding: 1.2rem 1.5rem; }
      .body-tex { font-size: 15px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 18px; }
      .unit-btn { font-size: 10px; padding: 4px 9px; }
      .body-tex { font-size: 13px; }
      .prob-id { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-inner">
      <div class="header-stripe"></div>
      <div class="header-body">
        <h1>BASIC ランダム演習</h1>
        <div class="tagline">科目・単元・問題数を選んでランダムに出題します</div>
      </div>
    </div>
  </div>

  <!-- 設定パネル -->
  <div class="panel">
    <div class="panel-stripe"></div>
    <div class="panel-body">
      <div class="panel-title">科目</div>
      <div class="source-tabs">
        <button class="src-tab active" data-src="IA">数学 I・A</button>
        <button class="src-tab active" data-src="IIBC">数学 II・B・C</button>
      <button class="src-tab active" data-src="IIIC">数学 III・C</button>
      </div>
      <div class="unit-header">
        <span class="panel-title" style="margin-bottom:0">単元</span>
        <button class="ctrl-btn" onclick="selectAllUnits()">すべて選択</button>
        <button class="ctrl-btn" onclick="clearAllUnits()">すべてクリア</button>
      </div>
      <div class="unit-grid" id="unitGrid"></div>
    </div>
  </div>

  <!-- 出題数 -->
  <div class="panel">
    <div class="panel-stripe"></div>
    <div class="panel-body">
      <div class="panel-title">出題数</div>
      <div class="count-row">
        <input type="range" id="countSlider" min="1" max="30" value="5" step="1">
        <span class="count-val" id="countVal">5</span>
        <span class="count-label">問</span>
      </div>
    </div>
  </div>

  <button class="gacha-btn" id="gachaBtn">ガチャを回す</button>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div>出題: <strong id="totalStat">0</strong> 問</div>
    <div>選択中: <strong id="poolStat">0</strong> 問から</div>
  </div>

  <div class="problem-list" id="problemList">
    <div class="empty">単元を選んでガチャを回してください</div>
  </div>

</div>
<script>
const ALL_PROBLEMS = [{"id":1,"unit":"\u6570\u3068\u5f0f","body":"\u6b21\u306e\u5f0f\u3092\u56e0\u6570\u5206\u89e3\u305b\u3088\uff0e\n\n(1) $x^2 + xy - x - y$\n(2) $6x^2 + x - 15$\n(3) $2x^2 - 3xy - 2y^2 - 5x + 5y + 3$\n(4) $xyz + x^2y - xy^2 - x + y - z$\n(5) $x^4 + 4$","hasImage":false,"source":"IA","displayId":"IA-1"},{"id":2,"unit":"\u6570\u3068\u5f0f","body":"(1) \u6b21\u306e\u5206\u6570\u3092\u5c0f\u6570\u3067\u8868\u305b\uff0e\n\n(i) $\\dfrac{2}{3}$\n(ii) $\\dfrac{2}{125}$\n(iii) $\\dfrac{29}{90}$\n(iv) $\\dfrac{4}{11}$\n(v) $\\dfrac{11}{74}$\n\n(2) \u6b21\u306e\u5faa\u74b0\u5c0f\u6570\u3092\u5206\u6570\u3067\u8868\u305b\uff0e\n\n(i) $0.\\dot{5}\\dot{3}$\n(ii) $0.2\\dot{4}\\dot{1}$\n(iii) $0.6\\dot{5}7\\dot{2}$","hasImage":false,"source":"IA","displayId":"IA-2"},{"id":3,"unit":"\u6570\u3068\u5f0f","body":"$x = \\dfrac{\\sqrt{3} - 1}{\\sqrt{3} + 1}$\uff0c$y = \\dfrac{\\sqrt{3} + 1}{\\sqrt{3} - 1}$ \u306e\u3068\u304d\uff0c\u6b21\u306e\u5024\u3092\u6c42\u3081\u3088\uff0e\n\n(1) $x+y$\n(2) $xy$\n(3) $x^2 + y^2$\n(4) $x^3 + y^3$\n(5) $x^4 + y^4$","hasImage":false,"source":"IA","displayId":"IA-3"},{"id":4,"unit":"\u6570\u3068\u5f0f","body":"(1) \u6b21\u306e\u5f0f\u3092\u7c21\u5358\u306b\u305b\u3088\uff0e\n\n(i) $\\sqrt{31 + 12\\sqrt{3}}$\n(ii) $\\sqrt{10 - 5\\sqrt{3}}$\n\n(2) $\\sqrt{31 + 12\\sqrt{3}}$ \u306e\u6574\u6570\u90e8\u5206\u3092 $a$\uff0c\u5c0f\u6570\u90e8\u5206\u3092 $b$ \u3068\u3059\u308b\u3068\u304d\uff0c$\\dfrac{2}{b} - a$ \u306e\u5024\u3092\u6c42\u3081\u3088\uff0e","hasImage":false,"source":"IA","displayId":"IA-4"},{"id":5,"unit":"\u6570\u3068\u5f0f","body":"(1) \u6b21\u306e\u9023\u7acb\u4e0d\u7b49\u5f0f\u3092\u89e3\u3051\uff0e\n\\[\\begin{cases} 3(1-x) \\leqq 5-x \\\\ x-9 < 6(2-x) \\end{cases}\\]\n\n(2) $5(x+1) \\geqq 3x+7$\uff0c$3(x-1) > 4x-a$ \u3092\u3068\u3082\u306b\u6e80\u305f\u3059\u6574\u6570 $x$ \u304c\u3061\u3087\u3046\u30693\u500b\u3042\u308b\u3088\u3046\u306a\u5b9a\u6570 $a$ \u306e\u5024\u306e\u7bc4\u56f2\u3092\u6c42\u3081\u3088\uff0e","ha const UNITS_IA   = [...new Set(ALL_PROBLEMS.filter(p=>p.source==='IA').map(p=>p.unit))];
const UNITS_IIBC = [...new Set(ALL_PROBLEMS.filter(p=>p.source==='IIBC').map(p=>p.unit))];
const UNITS_IIIC = [...new Set(ALL_PROBLEMS.filter(p=>p.source==='IIIC').map(p=>p.unit))];
const ALL_UNITS  = [...new Set([...UNITS_IA,...UNITS_IIBC,...UNITS_IIIC])];

var activeSources = new Set(['IA','IIBC','IIIC']);
var activeUnits   = new Set(ALL_UNITS);

var unitGrid = document.getElementById('unitGrid');
ALL_UNITS.forEach(function(u) {
  var btn = document.createElement('button');
  btn.className = 'unit-btn active';
  btn.textContent = u; btn.dataset.unit = u;
  btn.addEventListener('click', function() {
    if (activeUnits.has(u)) { activeUnits.delete(u); btn.classList.remove('active'); }
    else { activeUnits.add(u); btn.classList.add('active'); }
    updateUI();
  });
  unitGrid.appendChild(btn);
});

document.querySelectorAll('.src-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    var src = tab.dataset.src;
    if (activeSources.has(src)) { activeSources.delete(src); tab.classList.remove('active'); }
    else { activeSources.add(src); tab.classList.add('active'); }
    document.querySelectorAll('.unit-btn').forEach(function(btn) {
      var u = btn.dataset.unit;
      var avail = (UNITS_IA.includes(u) && activeSources.has('IA')) ||
                  (UNITS_IIBC.includes(u) && activeSources.has('IIBC')) ||
                  (UNITS_IIIC.includes(u) && activeSources.has('IIIC'));
      btn.classList.toggle('disabled-unit', !avail);
      if (!avail && activeUnits.has(u)) { activeUnits.delete(u); btn.classList.remove('active'); }
    });
    updateUI();
  });
});

function selectAllUnits() {
  document.querySelectorAll('.unit-btn:not(.disabled-unit)').forEach(function(btn) {
    activeUnits.add(btn.dataset.unit); btn.classList.add('active');
  });
  updateUI();
}
function clearAllUnits() {
  document.querySelectorAll('.unit-btn:not(.disabled-unit)').forEach(function(btn) {
    activeUnits.delete(btn.dataset.unit); btn.classList.remove('active');
  });
  updateUI();
}

var slider = document.getElementById('countSlider');
var countValEl = document.getElementById('countVal');
slider.addEventListener('input', function() { countValEl.textContent = slider.value; updateUI(); });

function getPool() {
  return ALL_PROBLEMS.filter(function(p) {
    return activeSources.has(p.source) && activeUnits.has(p.unit);
  });
}

function updateUI() {
  var pool = getPool();
  var btn = document.getElementById('gachaBtn');
  slider.max = Math.max(1, pool.length);
  if (parseInt(slider.value) > pool.length) {
    slider.value = Math.max(1, pool.length);
    countValEl.textContent = slider.value;
  }
  if (pool.length === 0) {
    btn.disabled = true; btn.textContent = '単元を選択してください';
  } else {
    btn.disabled = false;
    btn.textContent = 'ガチャを回す（' + pool.length + '問から' + Math.min(parseInt(slider.value), pool.length) + '問出題）';
  }
}
updateUI();

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

function renderBody(container, text) {
  // 大問番号: (1)(2)... または （１）（２）...
  var bigNumRe  = /^\s*[\uff08(](\d+|[\uff10-\uff19]+)[\uff09)]\s*/;
  // 小問番号: (i)(ii)(iii)... または (ア)(イ)...
  var subqRe    = /^\s*[\uff08(]([ivxIVX]+|[\u30a2-\u30f3]+)[\uff09)]\s*/;
  // 全小問番号（大問+小問）
  var anySubqRe = /^\s*[\uff08(][\u4e00-\u9fa5\d\uff10-\uff19ivxIVX\u30a2-\u30f3]+[\uff09)]\s*/;

  var fracRe = /\\(?:d?frac)\b/;
  var longKW = [
    '\u3060\u3060\u3057','\u3067\u3042\u308b\u3053\u3068\u3092','\u3067\u3042\u308b\u3068\u304d',
    '\u306e\u3068\u304d\uff0c','\u306b\u3064\u3044\u3066\u6b21','\u306b\u5bfe\u3057\u3066\u6b21',
    '\u3092\u8a3c\u660e\u305b\u3088','\u8a3c\u660e\u305b\u3088','\u3092\u793a\u305b',
    '\u3092\u6c42\u3081\u3088\u3002\u307e\u305f','\u3092\u6c42\u3081\u3088\u3002\u305f\u3060',
    '\u306b\u5185\u5206\u3059\u308b\u70b9','\u304b\u3089\u91cd\u8907\u3092\u8a31\u3057\u3066',
    '\u500b\u306e\u6587\u5b57\u304b\u3089','\u500b\u306e\u3082\u306e\u304b\u3089',
    '\u306e\u306a\u3059\u89d2','\u76f4\u7dda','\u306a\u3089\u3070','\u6210\u308a\u7acb\u3064'
  ];

  function hasFrac(s) { return fracRe.test(s); }

  // 行が大問番号行（数字番号＋日本語導入文）かどうか
  function isBigWithJP(line) {
    if (!bigNumRe.test(line)) return false;
    var content = line.replace(bigNumRe, '');
    return /[\u3040-\u9fff]/.test(content);
  }

  // shortかどうか（横並び可）
  function isShort(line) {
    // 大問番号＋日本語導入文 → 必ずlong
    if (isBigWithJP(line)) return false;
    var content = line.replace(anySubqRe, '');
    var t = content.replace(/\$[^$]+\$/g, 'X').replace(/\\[a-zA-Z]+/g, '').replace(/[{}_^\\]/g, '');
    var jpCount = (t.match(/[\u3040-\u9fff]/g) || []).length;
    if (jpCount > 10) return false;
    for (var k = 0; k < longKW.length; k++) {
      if (content.indexOf(longKW[k]) >= 0) return false;
    }
    return true;
  }

  function renderInline(el, text) {
    var re = /(\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\)|\$(?:[^$]|\\.)+\$|\[IMAGE:[^\]]+\])/g;
    var last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
      var part = m[0];
      if (part[0] === '\\' && part[1] === '[') {
        var d = document.createElement('span');
        try { katex.render(part.slice(2,-2).trim(), d, {displayMode:false, throwOnError:false}); }
        catch(e) { d.textContent = part; }
        el.appendChild(d);
      } else if (part[0] === '\\' && part[1] === '(') {
        var s = document.createElement('span');
        try { katex.render(part.slice(2,-2).trim(), s, {displayMode:false, throwOnError:false}); }
        catch(e) { s.textContent = part; }
        el.appendChild(s);
      } else if (part[0] === '$') {
        var s2 = document.createElement('span');
        try { katex.render(part.slice(1,-1), s2, {displayMode:false, throwOnError:false}); }
        catch(e) { s2.textContent = part; }
        el.appendChild(s2);
      } else if (part.indexOf('[IMAGE:') === 0) {
        var key = part.slice(7,-1);
        if (IMAGES[key]) {
          var img = document.createElement('img');
          img.src = 'data:image/png;base64,' + IMAGES[key];
          img.className = 'fig-img'; img.alt = key;
          el.appendChild(img);
        }
      }
      last = re.lastIndex;
    }
    if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
  }

  function flushSubqs(subqs, out) {
    if (!subqs.length) return;
    var wrap = document.createElement('div');
    wrap.className = 'subq-group';
    subqs.forEach(function(line) {
      var short = isShort(line);
      var frac  = hasFrac(line);
      var item  = document.createElement('div');
      item.className = 'subq-item'
        + (short ? ' short' : ' long')
        + (frac  ? ' has-frac' : '');
      renderInline(item, line.replace(/\u3000+$/g, ''));
      wrap.appendChild(item);
    });
    out.appendChild(wrap);
    subqs.length = 0;
  }

  var lines    = text.split('\n');
  var subqs    = [];
  var prevEmpty = false;

  lines.forEach(function(line) {
    var trimmed = line.trim();
    var isSubq  = anySubqRe.test(trimmed) && trimmed.length > 0;

    if (isSubq) {
      subqs.push(trimmed);
      prevEmpty = false;
    } else {
      flushSubqs(subqs, container);

      if (trimmed === '') {
        if (!prevEmpty) {
          var sp = document.createElement('div');
          sp.style.height = '0.4em';
          container.appendChild(sp);
        }
        prevEmpty = true;
      } else if (trimmed.slice(0,2) === '\\[') {
        var div = document.createElement('div');
        div.className = 'display-math';
        try { katex.render(trimmed.slice(2,-2).trim(), div, {displayMode:true, throwOnError:false}); }
        catch(e) { div.textContent = trimmed; }
        container.appendChild(div);
        prevEmpty = false;
      } else if (trimmed.indexOf('[IMAGE:') === 0) {
        var key = trimmed.slice(7,-1);
        if (IMAGES[key]) {
          var img = document.createElement('img');
          img.src = 'data:image/png;base64,' + IMAGES[key];
          img.className = 'fig-img'; img.alt = key;
          container.appendChild(img);
        }
        prevEmpty = false;
      } else {
        var div2 = document.createElement('div');
        div2.className = 'body-line' + (hasFrac(trimmed) ? ' has-frac' : '');
        renderInline(div2, trimmed);
        container.appendChild(div2);
        prevEmpty = false;
      }
    }
  });
  flushSubqs(subqs, container);
}


document.getElementById('gachaBtn').addEventListener('click', function() {
  var pool = getPool();
  var n = Math.min(parseInt(slider.value), pool.length);
  var picked = shuffle(pool).slice(0, n);

  document.getElementById('totalStat').textContent = picked.length;
  document.getElementById('poolStat').textContent = pool.length;
  document.getElementById('statsBar').style.display = 'flex';

  var list = document.getElementById('problemList');
  list.innerHTML = '';

  picked.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'problem-card';

    var stripe = document.createElement('div');
    stripe.className = 'card-stripe';

    var body = document.createElement('div');
    body.className = 'card-body';

    var header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = '<span class="num">(' + (i+1) + ')</span>'
      + '<span class="src-badge ' + p.source + '">' + (p.source==='IA'?'数 I·A':p.source==='IIBC'?'数 II·B·C':'数 III·C') + '</span>'
      + '<span class="unit-tag">' + p.unit + '</span>'
      + '<span class="prob-id">例題' + p.id + '</span>';

    var bodyEl = document.createElement('div');
    bodyEl.className = 'body-tex';
    renderBody(bodyEl, p.body);

    body.appendChild(header);
    body.appendChild(bodyEl);
    card.appendChild(stripe);
    card.appendChild(body);
    list.appendChild(card);
  });
});
</script>
